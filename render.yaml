services:
  - type: web
    name: webguard-scanner
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: BLACKBOX_API_KEY
        sync: false
      - key: ALLOW_PRIVATE_IPS
        value: "False"
